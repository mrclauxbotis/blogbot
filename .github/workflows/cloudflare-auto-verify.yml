name: Cloudflare Auto-Deploy Verification

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

jobs:
  verify-cloudflare-check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      cf_status: ${{ steps.cfcheck.outputs.cf_status }}
    steps:
      - id: cfcheck
        name: Verify Cloudflare check run (fail only on real failures)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.sha;

            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            const deadline = Date.now() + 5 * 60 * 1000; // 5 min

            let lastChecks = [];
            while (Date.now() < deadline) {
              const checks = await github.rest.checks.listForRef({ owner, repo, ref, per_page: 100 });
              const cloudflareChecks = checks.data.check_runs.filter(c => /cloudflare/i.test(c.name));
              lastChecks = cloudflareChecks;

              if (cloudflareChecks.length === 0) {
                // No check published yet; wait a bit
                await sleep(15000);
                continue;
              }

              const pending = cloudflareChecks.filter(c => c.status !== 'completed');
              if (pending.length > 0) {
                await sleep(15000);
                continue;
              }

              const failed = cloudflareChecks.filter(c => c.conclusion !== 'success');
              if (failed.length > 0) {
                core.setFailed(
                  `Cloudflare checks completed but not successful: ${failed.map(f => `${f.name}=${f.conclusion}`).join(', ')}`
                );
                return;
              }

              core.info('Cloudflare check(s) completed successfully.');
              core.setOutput('cf_status','ok');
              return;
            }

            if (lastChecks.length === 0) {
              core.warning('No Cloudflare check run published for this commit (after waiting).');
              core.setOutput('cf_status','missing');
              return;
            }

            // Still pending after timeout
            const pending = lastChecks.filter(c => c.status !== 'completed');
            if (pending.length > 0) {
              core.warning('Cloudflare check run still pending after timeout. Continuing to smoke test.');
              core.setOutput('cf_status','pending');
              return;
            }

  smoke-test-live-url:
    runs-on: ubuntu-latest
    needs: verify-cloudflare-check
    if: always()
    timeout-minutes: 8
    env:
      BLOG_URL: https://blog.jidokacommunity.org
    steps:
      - name: Smoke test blog URL after push
        run: |
          set -e
          echo "Testing $BLOG_URL"
          for i in {1..36}; do
            code=$(curl -s -o /tmp/blog.html -w "%{http_code}" "$BLOG_URL" || true)
            if [ "$code" = "200" ] && grep -Eqi "LLMCraft|LLM Craft|AI / LLM / GenAI" /tmp/blog.html; then
              echo "Smoke test passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed (status=$code). Retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after retries"
          exit 1
