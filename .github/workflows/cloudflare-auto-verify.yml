name: Cloudflare Auto-Deploy Verification

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

jobs:
  verify-cloudflare-check-optional:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: true
    steps:
      - name: Check whether Cloudflare check run exists (informational)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const ref = context.sha;
              const checks = await github.rest.checks.listForRef({ owner, repo, ref, per_page: 100 });
              const cloudflareChecks = checks.data.check_runs.filter(c => /cloudflare/i.test(c.name));
              if (cloudflareChecks.length === 0) {
                core.notice('No Cloudflare check run published for this commit.');
                return;
              }
              const summary = cloudflareChecks.map(c => `${c.name}: ${c.status}/${c.conclusion ?? 'n/a'}`).join(' | ');
              core.info(`Cloudflare checks found -> ${summary}`);
            } catch (err) {
              core.warning(`Cloudflare check probe failed (non-blocking): ${err.message}`);
            }

  smoke-test-live-url:
    runs-on: ubuntu-latest
    needs: verify-cloudflare-check-optional
    if: always()
    timeout-minutes: 8
    env:
      BLOG_URL: https://blog.jidokacommunity.org
    steps:
      - name: Smoke test blog URL after push
        run: |
          set -e
          echo "Testing $BLOG_URL"
          for i in {1..36}; do
            code=$(curl -s -o /tmp/blog.html -w "%{http_code}" "$BLOG_URL" || true)
            if [ "$code" = "200" ] && grep -Eqi "LLMCraft|LLM Craft|AI / LLM / GenAI" /tmp/blog.html; then
              echo "Smoke test passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed (status=$code). Retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after retries"
          exit 1
