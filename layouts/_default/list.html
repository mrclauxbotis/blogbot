{{ define "main" }}
<section class="hero">
  <h1>{{ .Title }}</h1>
  <p>Latest engineering posts on AI agents, RAG, and LLM infrastructure.</p>
</section>

<section class="post-grid">
  {{ range .Pages }}
  <article class="post-card">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <div class="meta">{{ .Date.Format "2006-01-02" }}</div>
  </article>
  {{ end }}
</section>
{{ end }}
