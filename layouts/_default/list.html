{{ define "main" }}
<section class="prose">
  <h1>{{ .Title }}</h1>
</section>
<section class="post-grid">
  {{ range .Pages }}
  <article class="post-card">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <div class="meta">{{ .Date.Format "2006-01-02" }}</div>
  </article>
  {{ end }}
</section>
{{ end }}
