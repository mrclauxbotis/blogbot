{{ define "main" }}
<section class="hero">
  <h1>{{ .Site.Title }}</h1>
  <p>{{ .Site.Params.description }}</p>
</section>

<section class="post-grid">
  {{ range first 24 (where .Site.RegularPages "Section" "posts") }}
  <article class="post-card">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <div class="meta">{{ .Date.Format "2006-01-02" }}</div>
  </article>
  {{ end }}
</section>
{{ end }}
